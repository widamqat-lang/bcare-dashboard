services:
  - type: web
    name: bcare-dashboard
    env: static
    plan: free
    rootDir: artifacts/phishing-pages
    buildCommand: pnpm install && pnpm build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    envVars:
      - key: NODE_ENV
        value: production
    autoDeploy: true
